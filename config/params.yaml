ebimu_publisher:
  ros__parameters:
    # Serial
    port: "/dev/ttyUSB0"
    baud: 115200

    # Topic / frame
    topic_name: "/imu/data"
    gravity_topic_name: "/imu/gravity"
    frame_id: "imu_link"

    # Publish rate
    publish_rate_hz: 50

    # Unit conversion
    accel_scale: 9.80665
    gyro_in_deg: true
    invert_accel_sign: true

    # Orientation reset
    zero_orientation_on_start: true

    # QoS
    reliability: "best_effort"
    depth: 1

imu_ui_node:
  ros__parameters:
    # Topic / frame
    input_topic: "/imu/data"
    output_topic: "/imu/data_zeroed"
    frame_id: "imu_link"

    # Republish
    enable_publish: true
    publish_rate_hz: 50

    # Initial RPY offsets
    initial_roll_offset_deg: 0.0
    initial_pitch_offset_deg: 0.0
    initial_yaw_offset_deg: 0.0

    # UI range
    roll_slider_min_deg: -90
    roll_slider_max_deg: 90
    pitch_slider_min_deg: -90
    pitch_slider_max_deg: 90

    reliability: "best_effort"
    depth: 1